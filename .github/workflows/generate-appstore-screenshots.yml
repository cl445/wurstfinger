name: Generate App Store Screenshots

on:
  workflow_dispatch:
    inputs:
      upload_artifact:
        description: 'Upload screenshots as artifact'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  generate-screenshots:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      # The image default (Xcode 16.4 on macos-15) lacks the iPhone 17 / 16e
      # simulators the script renders on. Select the newest installed Xcode 26.
      - name: Select Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode 26 installation found on the runner image"
            ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: List available simulators
        run: |
          echo "Available iOS Simulators:"
          xcrun simctl list devices available | grep -E "iPhone" || true

      - name: Generate App Store screenshots
        run: |
          chmod +x ./scripts/generate-appstore-screenshots.sh
          ./scripts/generate-appstore-screenshots.sh
        timeout-minutes: 30

      - name: List generated screenshots
        run: |
          echo "Generated screenshots:"
          find fastlane/screenshots -type f -name "*.png" | sort

          echo ""
          echo "Screenshot sizes:"
          for file in $(find fastlane/screenshots -type f -name "*.png" | sort); do
            size=$(sips -g pixelWidth -g pixelHeight "$file" | awk '/pixelWidth/{w=$2} /pixelHeight/{h=$2} END{print w" x "h}')
            echo "  $file: $size"
          done

      - name: Upload screenshots artifact
        if: ${{ inputs.upload_artifact }}
        uses: actions/upload-artifact@v7
        with:
          name: appstore-screenshots
          path: fastlane/screenshots/
          retention-days: 30
          if-no-files-found: error

      - name: Summary
        run: |
          echo "## App Store Screenshots Generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Prefix | Device | Resolution |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| 69 | iPhone 17 Pro Max (6.9\") | 1320 x 2868 |" >> $GITHUB_STEP_SUMMARY
          echo "| 61 | iPhone 16e (6.1\") | 1170 x 2532 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Locales: en-US, de-DE (mirrored). Download the artifact to review, then commit to fastlane/screenshots/." >> $GITHUB_STEP_SUMMARY
