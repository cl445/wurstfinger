name: Update Screenshots

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'wurstfinger/**/*.swift'
      - 'wurstfingerKeyboard/**/*.swift'
      - 'scripts/**'
      - '.github/workflows/update-screenshots.yml'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-screenshots:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Cache Python venv
        uses: actions/cache@v5
        with:
          path: venv
          key: ${{ runner.os }}-venv-${{ hashFiles('scripts/generate-screenshots.sh') }}

      - name: Install Python dependencies
        run: |
          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install Pillow numpy

      # The image default (Xcode 16.4 on macos-15) ships an older simulator
      # set; select the newest installed Xcode 26 to match local development.
      - name: Select Xcode 26
        run: |
          XCODE_APP=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -n 1)
          if [ -z "$XCODE_APP" ]; then
            echo "::error::No Xcode 26 installation found on the runner image"
            ls -d /Applications/Xcode*.app
            exit 1
          fi
          echo "Selecting $XCODE_APP"
          sudo xcode-select -s "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      # Warm-boot only: the script detects and boots its own simulator, so a
      # missing preferred device must not fail the job (this step used to
      # hard-fail on an empty UDID when the hardcoded device was absent).
      - name: Boot iOS Simulator
        run: |
          DEVICE_UDID=$(xcrun simctl list devices available | grep -E "iPhone" | grep -v "SE" | head -n 1 | grep -oE '[0-9A-F]{8}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{4}-[0-9A-F]{12}' || true)
          if [ -z "$DEVICE_UDID" ]; then
            echo "No iPhone simulator found to warm-boot; the script will handle device selection"
            xcrun simctl list devices available
            exit 0
          fi
          echo "Booting simulator: $DEVICE_UDID"
          xcrun simctl boot "$DEVICE_UDID" 2>/dev/null || true
          # Wait for simulator to be ready
          xcrun simctl bootstatus "$DEVICE_UDID" -b
          echo "Simulator ready"

      - name: Save existing screenshots for comparison
        run: |
          mkdir -p /tmp/old-screenshots
          cp docs/images/*.webp /tmp/old-screenshots/ 2>/dev/null || true

      - name: Generate screenshots
        run: |
          source venv/bin/activate
          ./scripts/generate-screenshots.sh
        timeout-minutes: 25

      - name: Check for visual screenshot changes
        id: check_changes
        run: |
          source venv/bin/activate
          python3 << 'PYEOF'
          import os
          import sys
          from PIL import Image
          import numpy as np

          OLD_DIR = "/tmp/old-screenshots"
          NEW_DIR = "docs/images"
          # Per-pixel noise threshold: channel differences below this are compression noise
          PIXEL_THRESHOLD = 10
          # Fraction of pixels that must exceed PIXEL_THRESHOLD to count as a real change
          CHANGE_RATIO = 0.001  # 0.1% of pixels

          changed = False
          old_files = {f for f in os.listdir(OLD_DIR) if f.endswith(".webp")} if os.path.isdir(OLD_DIR) else set()
          new_files = {f for f in os.listdir(NEW_DIR) if f.endswith(".webp")}

          # Detect removed/renamed screenshots
          removed = old_files - new_files
          for filename in sorted(removed):
              print(f"  🗑️  Removed screenshot: {filename}")
              changed = True

          for filename in sorted(new_files):
              old_path = os.path.join(OLD_DIR, filename)
              new_path = os.path.join(NEW_DIR, filename)

              if not os.path.exists(old_path):
                  print(f"  ✨ New screenshot: {filename}")
                  changed = True
                  continue

              old_img = Image.open(old_path).convert("RGB")
              new_img = Image.open(new_path).convert("RGB")

              # Dimension changes indicate a real layout shift (or crop jitter
              # from non-deterministic cropping). Flag as changed instead of
              # resizing — resize-and-compare masks crop bugs and also turns
              # tiny layout diffs into huge pixel deltas across the whole image.
              if old_img.size != new_img.size:
                  print(
                      f"  📐 Dimension change: {filename} "
                      f"{old_img.size} -> {new_img.size}"
                  )
                  changed = True
                  continue

              old_arr = np.array(old_img)
              new_arr = np.array(new_img)

              # Count pixels where any channel differs beyond noise threshold
              pixel_diff = np.max(np.abs(old_arr.astype(float) - new_arr.astype(float)), axis=2)
              changed_pixels = np.sum(pixel_diff > PIXEL_THRESHOLD)
              total_pixels = pixel_diff.size
              ratio = changed_pixels / total_pixels
              if ratio > CHANGE_RATIO:
                  print(f"  🔄 Visual change: {filename} ({changed_pixels}/{total_pixels} pixels changed, {ratio:.4%})")
                  changed = True
              else:
                  print(f"  ✅ Unchanged: {filename} ({changed_pixels}/{total_pixels} pixels changed, {ratio:.4%})")
                  # Restore old file so git sees no diff
                  os.replace(old_path, new_path)

          if changed:
              print("\nResult: Visual changes detected!")
          else:
              print("\nResult: No visual changes")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")
          PYEOF

      - name: Create or update PR with screenshots
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BASE_BRANCH="${{ github.ref_name }}"
          # Stable branch name per base so repeated runs reuse one PR
          # instead of piling up duplicate screenshot PRs.
          BRANCH_NAME="automated/update-screenshots-${BASE_BRANCH}"

          # The branch always holds exactly "base + one screenshot commit".
          # Recreating it from the current base commit and force-pushing keeps
          # an existing PR up to date without checkout conflicts against the
          # freshly generated (uncommitted) screenshots in the working tree.
          git checkout -B "$BRANCH_NAME"
          git add -A docs/images/
          git commit -m "Update screenshots"
          git push -f -u origin "$BRANCH_NAME"

          # Open a PR only if none is already tracking this branch
          EXISTING_PR=$(gh pr list --state open --head "$BRANCH_NAME" --base "$BASE_BRANCH" --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING_PR" ]; then
            echo "Updated existing PR #${EXISTING_PR}"
          else
            gh pr create \
              --title "Update screenshots" \
              --body "Automated screenshot update from CI workflow." \
              --base "$BASE_BRANCH"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
